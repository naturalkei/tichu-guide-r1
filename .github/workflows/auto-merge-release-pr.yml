name: Auto Merge Release PR

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release PR
        id: release-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to get the PR number from the workflow_run event
          pr_number=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")

          # If it's not in the event, try searching for the PR associated with this run's head_sha
          if [ -z "$pr_number" ]; then
            head_sha=${{ github.event.workflow_run.head_sha }}
            pr_number=$(gh pr list --state open --json number,mergeCommit,headRefOid --jq ".[] | select(.mergeCommit.oid == \"$head_sha\" or .headRefOid == \"$head_sha\") | .number" | head -n 1)
          fi

          if [ -z "$pr_number" ]; then
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json=$(gh pr view "$pr_number" --json number,title,baseRefName,headRefName,state,isDraft)
          title=$(echo "$pr_json" | jq -r '.title')
          base_ref=$(echo "$pr_json" | jq -r '.baseRefName')
          head_ref=$(echo "$pr_json" | jq -r '.headRefName')
          state=$(echo "$pr_json" | jq -r '.state')
          is_draft=$(echo "$pr_json" | jq -r '.isDraft')

          if [ "$state" != "OPEN" ] || [ "$is_draft" != "false" ]; then
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Release please PR title pattern
          if [[ ! "$title" =~ ^chore\(.*\):\ release.* ]]; then
              echo "should_merge=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          if [ "$base_ref" != "main" ]; then
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "should_merge=true" >> "$GITHUB_OUTPUT"

      - name: Merge release PR
        if: steps.release-pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.release-pr.outputs.number }}" --squash --delete-branch
